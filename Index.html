<script>
/* ===========================
   KONFIGURASI PRODUCTION
=========================== */
const IS_PREVIEW = false; 
const GAS_URL = "https://script.google.com/macros/s/AKfycbyntbMyKunHn4KekfMcRz32cCqZicr-4ON34ZbFSezLoYaYSFT-an8UueM03Xpi48cnxQ/exec"; // <-- GANTI DENGAN URL APPS SCRIPT ANDA

const APP_CONFIG = {
    IS_PREVIEW,
    GAS_URL,
    VERSION: "4.6.2"
};

/* ===========================
   SISTEM KEAMANAN & MODE
=========================== */
function isGasUrlValid() {
    return /^https:\/\/script\.google\.com\/macros\/s\/.+\/exec(\?.*)?$/.test(APP_CONFIG.GAS_URL || "");
}

function isGasUrlPlaceholder() {
    return !APP_CONFIG.GAS_URL || 
           APP_CONFIG.GAS_URL.includes("TEMPEL_URL_WEB_APP_EXEC_DI_SINI") || 
           APP_CONFIG.GAS_URL.trim() === "";
}

function isBloggerRuntime() {
    const host = window.location.hostname || "";
    return host.includes("blogspot.") || 
           host.includes("blogger.") || 
           (host !== "localhost" && host !== "127.0.0.1" && !host.includes("gemini") && !host.includes("aistudio") && window.location.protocol !== "file:");
}

function isCanvasOrLocalPreview() {
    const host = window.location.hostname || "";
    return host === "localhost" || host === "127.0.0.1" || host.includes("gemini") || host.includes("aistudio") || window.location.protocol === "file:";
}

const APP_MODE = {
    isPreview: APP_CONFIG.IS_PREVIEW === true && isGasUrlPlaceholder() && isCanvasOrLocalPreview(),
    isProduction: isBloggerRuntime() || isGasUrlValid() || APP_CONFIG.IS_PREVIEW === false
};

const SHOW_DEMO_UI = APP_MODE.isPreview && !APP_MODE.isProduction;

/* ===========================
   FETCH API UTAMA (SAFE CORS)
=========================== */
async function fetchAPI(action, payload = {}) {
    if (isGasUrlPlaceholder()) {
        return { success: false, message: "Konfigurasi belum lengkap. Silakan tempel URL Web App /exec ke GAS_URL." };
    }

    try {
        // WAJIB: Simple Request text/plain untuk bypass preflight OPTIONS di Blogger
        const requestBody = JSON.stringify({
            action: action,
            payload: payload || {}
        });

        const response = await fetch(APP_CONFIG.GAS_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: requestBody
        });

        const text = await response.text();

        try {
            return JSON.parse(text);
        } catch (parseError) {
            return { success: false, message: "Response server tidak valid (Bukan JSON). Cek Apps Script." };
        }
    } catch (error) {
        return { success: false, message: "Gagal terhubung ke server. Periksa GAS_URL dan koneksi internet." };
    }
}

/* ===========================
   UI HELPERS
=========================== */
function showLoading(text = "Memproses...") {
    document.getElementById("loading-text").innerText = text;
    document.getElementById("loading-overlay").classList.remove("hidden");
    document.getElementById("loading-overlay").classList.add("flex");
}

function hideLoading() {
    document.getElementById("loading-overlay").classList.add("hidden");
    document.getElementById("loading-overlay").classList.remove("flex");
}

function showToast(message, type = "success") {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    const bg = type === 'success' ? 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400' : 'bg-rose-500/20 border-rose-500/50 text-rose-400';
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    
    toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg border ${bg} backdrop-blur-md shadow-lg transform transition-all duration-300 translate-y-10 opacity-0 pointer-events-auto`;
    toast.innerHTML = `<i class="fas ${icon} text-lg"></i><span class="font-medium">${message}</span>`;
    
    container.appendChild(toast);
    setTimeout(() => { toast.classList.remove("translate-y-10", "opacity-0"); }, 10);
    setTimeout(() => {
        toast.classList.add("translate-y-10", "opacity-0");
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function renderDemoOnlyUI() {
    if (!SHOW_DEMO_UI) return "";
    return `
        <div class="demo-only mt-6 p-4 rounded-xl border border-indigo-500/30 bg-indigo-500/10 backdrop-blur-sm" data-demo-only="true">

                <i class="fas fa-flask"></i> Mode Preview Aktif

            <button type="button" onclick="document.getElementById('username').value='admin'; document.getElementById('password').value='123';" class="mt-3 w-full py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded text-xs font-medium transition">
                <i class="fas fa-magic mr-1"></i> Auto Fill
            </button>
        </div>
    `;
}

function removeDemoUIForProduction() {
    if (SHOW_DEMO_UI) return;
    document.querySelectorAll("[data-demo-only='true'], .demo-only").forEach(el => el.remove());
}

/* ===========================
   RENDER & LOGIC
=========================== */

    }

    root.innerHTML = `

                            <input type="text" id="username" required class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl pl-11 pr-4 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-600" placeholder="Masukkan username">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5 ml-1">Password</label>

                            <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                            <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 text-white rounded-xl pl-11 pr-10 py-3 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-slate-600" placeholder="••••••••">
                            <i class="fas fa-eye absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 cursor-pointer hover:text-slate-300" onclick="togglePassword()"></i>
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-500 hover:from-indigo-500 hover:to-indigo-400 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-indigo-500/25 transition-all active:scale-[0.98]">
                        Masuk Sistem <i class="fas fa-arrow-right ml-2 text-xs"></i>
                    </button>
                </form>

                ${renderDemoOnlyUI()}

                <div class="mt-8 text-center text-slate-500 text-xs">
                    &copy; 2026 WebApp Studio Pro. v${APP_CONFIG.VERSION}
                </div>
            </div>
        </div>
    `;
    removeDemoUIForProduction();
}

function togglePassword() {
    const input = document.getElementById('password');
    input.type = input.type === 'password' ? 'text' : 'password';
}

async function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;
    
    showLoading("Otentikasi Kredensial...");
    const res = await fetchAPI("login", { username: u, password: p });
    hideLoading();

    if (res.success) {
        showToast("Login berhasil!", "success");
        sessionStorage.setItem("hg_session", JSON.stringify(res.data));
        checkLogin();
    } else {
        showToast(res.message, "error");
    }
}

function handleLogout() {
    sessionStorage.removeItem("hg_session");
    checkLogin();
}

function toggleSidebar() {
    const sidebar = document.getElementById('mobile-sidebar');
    if (sidebar.classList.contains('-translate-x-full')) {
        sidebar.classList.remove('hidden');
        setTimeout(() => sidebar.classList.remove('-translate-x-full'), 10);
    } else {
        sidebar.classList.add('-translate-x-full');
        setTimeout(() => sidebar.classList.add('hidden'), 300);
    }
}

function updateMenuState(clickedEl) {
    if(!clickedEl) return;
    document.querySelectorAll('.menu-item').forEach(el => {
        el.classList.remove('sidebar-nav-active', 'text-white');
        el.classList.add('text-slate-400');
    });
    clickedEl.classList.add('sidebar-nav-active', 'text-white');
    clickedEl.classList.remove('text-slate-400');
}

function loadPage(page, menuElement) {
    if(menuElement) updateMenuState(menuElement);
    if(page === 'dashboard') loadDashboard();
    if(page === 'guru') loadDataGuru();
}

/* ===========================
   PAGES
=========================== */

            </div>
        </div>
    `;

    // Render Chart.js Dummy Data (Since full daily tracking requires heavier backend logic, we simulate the chart visually)
    setTimeout(() => {
        try {
            const ctx = document.getElementById('attendanceChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'],
                    datasets: [{
                        label: 'Hadir',
                        data: [18, 19, 17, data.hadirHariIni, 0],
                        backgroundColor: 'rgba(99, 102, 241, 0.8)',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8' } } },
                    scales: {
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' }, beginAtZero: true },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        } catch(e){}
    }, 200);
}

async function loadDataGuru() {
    document.getElementById("page-title").innerText = "Data Master Guru";
    document.getElementById("page-subtitle").innerText = "Kelola data guru dan mata pelajaran";
    const content = document.getElementById("main-content");
    
    content.innerHTML = `<div class="animate-pulse h-96 bg-slate-800/50 rounded-2xl"></div>`;
    
    const res = await fetchAPI("getGuru");

    let tableHtml = "";
    if(res.success && res.data.length > 0) {
        tableHtml = res.data.map((g, i) => `
            <tr class="border-b border-slate-800 hover:bg-slate-800/30 transition">
                <td class="p-4 text-slate-400">${i+1}</td>
                <td class="p-4 font-medium text-slate-200">${g.nama}</td>
                <td class="p-4 text-slate-400">${g.nip || '-'}</td>
                <td class="p-4 text-slate-400">${g.mapel}</td>
                <td class="p-4">
                    <span class="px-2.5 py-1 text-[10px] uppercase font-bold rounded-full ${g.status === 'Aktif' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/20' : 'bg-slate-500/10 text-slate-400 border border-slate-500/20'}">${g.status}</span>
                </td>
                <td class="p-4 text-right space-x-2">
                    <button onclick="deleteGuru('${g.id}')" class="w-8 h-8 rounded-lg bg-rose-500/10 text-rose-400 hover:bg-rose-500 hover:text-white transition" title="Hapus"><i class="fas fa-trash text-xs"></i></button>
                </td>
            </tr>
        `).join('');
    } else {
        tableHtml = `<tr><td colspan="6" class="p-8 text-center text-slate-500">Belum ada data guru.</td></tr>`;
    }

    content.innerHTML = `
        <div class="glass-panel rounded-2xl border border-slate-800 overflow-hidden flex flex-col h-full">
            <div class="p-5 border-b border-slate-800 flex flex-wrap gap-4 items-center justify-between bg-slate-900/30">
                <div class="relative w-full md:w-64">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
                    <input type="text" id="search-guru" placeholder="Cari nama / NIP..." class="w-full bg-slate-950/50 border border-slate-700 text-sm text-white rounded-xl pl-9 pr-4 py-2.5 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <button onclick="showModalGuru()" class="w-full md:w-auto bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-medium transition shadow-lg shadow-indigo-500/20 flex items-center justify-center gap-2 text-sm">
                    <i class="fas fa-plus"></i> Tambah Guru
                </button>
            </div>
            <div class="overflow-x-auto flex-grow">
                <table class="w-full text-left text-sm whitespace-nowrap min-w-[700px]">
                    <thead class="bg-slate-900/80 border-b border-slate-800 text-slate-400">
                        <tr>
                            <th class="p-4 font-medium w-16">No</th>
                            <th class="p-4 font-medium">Nama Lengkap</th>
                            <th class="p-4 font-medium">NIP / NIK</th>
                            <th class="p-4 font-medium">Mata Pelajaran</th>
                            <th class="p-4 font-medium">Status</th>
                            <th class="p-4 font-medium text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${tableHtml}
                    </tbody>
                </table>
            </div>
        </div>

        <!-- MODAL TAMBAH GURU -->
        <div id="modal-guru" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[60] hidden flex-col items-center justify-center p-4 opacity-0 smooth-transition">
            <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-md overflow-hidden shadow-2xl transform scale-95 transition-transform" id="modal-guru-content">
                <div class="p-5 border-b border-slate-800 flex justify-between items-center bg-slate-800/30">
                    <h3 class="text-white font-semibold text-lg"><i class="fas fa-user-plus text-indigo-400 mr-2"></i> Tambah Data Guru</h3>
                    <button onclick="closeModalGuru()" class="text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
                </div>
                <form onsubmit="handleSaveGuru(event)" class="p-5 space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Nama Lengkap</label>
                        <input type="text" id="form-nama" required class="w-full bg-slate-950 border border-slate-700 text-white rounded-lg px-3 py-2.5 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">NIP / NIK (Opsional)</label>
                        <input type="text" id="form-nip" class="w-full bg-slate-950 border border-slate-700 text-white rounded-lg px-3 py-2.5 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1">Mata Pelajaran Utama</label>
                        <input type="text" id="form-mapel" required class="w-full bg-slate-950 border border-slate-700 text-white rounded-lg px-3 py-2.5 focus:border-indigo-500 outline-none text-sm">
                    </div>
                    <div class="pt-2 flex justify-end gap-3">
                        <button type="button" onclick="closeModalGuru()" class="px-4 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800 transition">Batal</button>
                        <button type="submit" class="px-5 py-2 rounded-lg text-sm font-medium bg-indigo-600 text-white hover:bg-indigo-500 transition shadow-lg shadow-indigo-500/20">Simpan Data</button>
                    </div>
                </form>
            </div>
        </div>
    `;

    // Simple Client-side Search
    document.getElementById('search-guru')?.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        const rows = document.querySelectorAll('tbody tr');
        rows.forEach(row => {
            const text = row.innerText.toLowerCase();
            row.style.display = text.includes(val) ? '' : 'none';
        });
    });
}

function showModalGuru() {
    const modal = document.getElementById("modal-guru");
    const content = document.getElementById("modal-guru-content");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    setTimeout(() => {
        modal.classList.remove("opacity-0");
        content.classList.remove("scale-95");
    }, 10);
}

function closeModalGuru() {
    const modal = document.getElementById("modal-guru");
    const content = document.getElementById("modal-guru-content");
    modal.classList.add("opacity-0");
    content.classList.add("scale-95");
    setTimeout(() => {
        modal.classList.remove("flex");
        modal.classList.add("hidden");
    }, 300);
}

async function handleSaveGuru(e) {
    e.preventDefault();
    const nama = document.getElementById("form-nama").value;
    const nip = document.getElementById("form-nip").value;
    const mapel = document.getElementById("form-mapel").value;

    closeModalGuru();
    showLoading("Menyimpan Data...");
    
    const res = await fetchAPI("saveGuru", { nama, nip, mapel, status: "Aktif" });
    hideLoading();
    
    if(res.success) {
        showToast(res.message, "success");
        loadDataGuru(); 
    } else {
        showToast(res.message, "error");
    }
}

async function deleteGuru(id) {
    if(confirm("Apakah Anda yakin ingin menghapus data guru ini?")) {
        showLoading("Menghapus Data...");
        const res = await fetchAPI("deleteGuru", { id });
        hideLoading();
        
        if(res.success) {
            showToast(res.message, "success");
            loadDataGuru();
        } else {
            showToast(res.message, "error");
        }
    }
}
